<!DOCTYPE html>
<html>
<head>
    <title>View Note</title>
</head>
<body>
    <h2>{{ note['title'] }}</h2>
    <p>{{ note['content'] }}</p>
    <small>Created: {{ note['created_at'] }}</small>

    <div>
        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
        <form method="POST" action="{{ url_for('delete_note', note_id=note['id']) }}" style="display: inline;">
            <button type="submit" onclick="return confirm('Delete this note?')">Delete Note</button>
        </form>
    </div>
</body>
</html>
