<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h1>Welcome, {{ session['username'] }}</h1>
    <a href="{{ url_for('logout') }}">Logout</a>

    <a href="{{ url_for('add_note') }}">Add New Note</a>

    <h2>Your Notes</h2>

    {% if notes %}
        {% for note in notes %}
            <div>
                <h3>{{ note['title'] }}</h3>
                <p>{{ note['content'][:100] }}...</p>
                <small>Created: {{ note['created_at'] }}</small><br>
                <a href="{{ url_for('view_note', note_id=note['id']) }}">View</a>
                <form method="POST" action="{{ url_for('delete_note', note_id=note['id']) }}" style="display: inline;">
                    <button type="submit" onclick="return confirm('Delete this note?')">Delete</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>You haven't created any notes yet. <a href="{{ url_for('add_note') }}"></a></p>
    {% endif %}
</body>
</html>
